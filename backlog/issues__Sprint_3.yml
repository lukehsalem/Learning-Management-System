  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
- id: ISSUE-39
  title: The course detail screen should let a teacher manage the roster of the course
  body: Teachers should be able to add or remove a student from the roster.
  labels:
  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
- id: ISSUE-40
  title: The teacher main menu should let the user manage the list of students enrolled
    at the university
  body: Teachers should be able to add a student, edit students, or remove students
    from the system. Removing a student from the system should automatically remove
    their enrollment in all courses and delete their assignment submissions and grades.
  labels:
  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
- id: ISSUE-41
  title: The course detail screen should let teachers manage assignments for the course
  body: Teachers should be able to add, update, and delete assignments for a course.
    When an assignment is deleted, the the submissions for that assignment should
    also be deleted.
  labels:
  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
- id: ISSUE-42
  title: The course detail screen should let teachers manage modules and module content
  body: Teachers should be able to add modules and content to modules, remove modules
    and content from modules, and update modules and module content.
  labels:
  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
- id: ISSUE-43
  title: Teachers should be able to copy assignments from one course to another
  body: Copying an assignment should not copy student submissions.
  labels:
  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
- id: ISSUE-44
  title: Teachers should be able to export and import student rosters from / into
    a course respectively.
  body: If a student roster is already associated with a course, imports must be idempotent
    and non-destructive by importing only new student associations in the import file.
  labels:
  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
