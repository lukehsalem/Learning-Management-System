name: Ensure Backlog IDs

on:
  workflow_dispatch:
  issues:
    types: [opened, edited, labeled]

permissions:
  issues: write

jobs:
  ensure-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ensure backlog-id marker on course-backlog issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKLOG_LABEL: course-backlog
        run: |
          python - <<'PY'
          import os, re, requests

          token = os.environ["GITHUB_TOKEN"]
          backlog_label = os.environ.get("BACKLOG_LABEL", "course-backlog")

          owner, repo = os.environ["GITHUB_REPOSITORY"].split("/")
          api = "https://api.github.com"
          headers = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
          }

          def get(url, params=None):
            r = requests.get(url, headers=headers, params=params)
            r.raise_for_status()
            return r.json(), r.headers

          def patch(url, payload):
            r = requests.patch(url, headers=headers, json=payload)
            r.raise_for_status()
            return r.json()

          # Only handle the single issue in the webhook case if we can
          issue_num = os.environ.get("GITHUB_EVENT_PATH")
          # We'll just list open backlog issues; cheap enough for course repos
          issues = []
          page = 1
          while True:
            data, _ = get(f"{api}/repos/{owner}/{repo}/issues",
                          params={"state":"open","labels":backlog_label,"per_page":100,"page":page})
            if not data: break
            issues.extend([i for i in data if "pull_request" not in i])
            if len(data) < 100: break
            page += 1

          pat = re.compile(r"<!--\s*backlog-id:\s*([A-Za-z0-9._-]+)\s*-->")
          for i in issues:
            body = i.get("body") or ""
            if pat.search(body):
              continue
            # default ID: ISSUE-<number> (stable within the repo)
            new_id = f"ISSUE-{i['number']}"
            marker = f"<!-- backlog-id: {new_id} -->\n\n"
            print(f"Adding backlog-id to #{i['number']}: {new_id}")
            patch(f"{api}/repos/{owner}/{repo}/issues/{i['number']}", {"body": marker + body})
          PY
