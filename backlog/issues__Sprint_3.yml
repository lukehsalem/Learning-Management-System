- id: ISSUE-33
  title: The application should have a main menu in MAUI.NET
  body: The main menu should have two buttons, one to use the application as a teacher
    and one to use the application as a student.
  labels:
  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
- id: ISSUE-34
  title: The student menu should allow the user to select a student from a list of
    available students
  body: Upon selection, the user should see courses that the student is enrolled in
    and be able to interact with those courses
  labels:
  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
- id: ISSUE-35
  title: The student and teacher menus should allow the user to return to the main
    menu
  body: The application should avoid user traps by allowing the user to return to
    the main menu from either the student or teacher menus
  labels:
  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
- id: ISSUE-36
  title: The student view should display a list of courses and allow a student to
    select a course to interact with
  body: When a student chooses a course from the list, they should be taken to a detail
    view of the course that allows them to interact with the details of a course such
    as their assignments, modules and module content, and their grades.
  labels:
  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
- id: ISSUE-37
  title: The course detail screen should let students submit their response to an
    assignment
  body: Students should be able to use a textbox to respond to an assignment.
  labels:
  - course-backlog
  - sprint:03
  - type:feature
  milestone: Sprint 3
- id: ISSUE-38
  title: The course detail screen should prominently display the letter grade a student
    currently has in the course
  body: ''
