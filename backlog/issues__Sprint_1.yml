  labels:
  - course-backlog
  - sprint:01
  - type:feature
  milestone: Sprint 1
- id: ISSUE-3
  title: Create a CLI menu that allows a user to choose if they are a student or teacher
  body: This constitutes the first menu in the application, which allows a user to
    differentiate themselves as a user who should see the application as a student
    or a teacher.
  labels:
  - course-backlog
  - sprint:01
  - type:feature
  milestone: Sprint 1
- id: ISSUE-4
  title: Create a CLI menu that shows the teacher sub-menu
  body: Teachers should be able to choose between adding a new course or selecting
    an existing course using this menu. Selection should be based on a stable Id and
    not the index of the course in a list.
  labels:
  - course-backlog
  - sprint:01
  - type:feature
  milestone: Sprint 1
- id: ISSUE-6
  title: Create a CLI menu that allows the user to select an existing student to proxy
    as
  body: Once selected, the user should be redirected to the student sub-menu as if
    they had logged into the application as the selected user.
  labels:
  - course-backlog
  - sprint:01
  - type:feature
  milestone: Sprint 1
- id: ISSUE-8
  title: Create a CLI menu that serves as the main menu for a course
  body: 'The menu should show the name and code of the course as well as let the student:


    - See all modules and module content

    - See all assignments

    - See other students in the course

    - See course schedule - a list of assignments + their due dates'
  labels:
  - course-backlog
  - sprint:01
  - type:feature
  milestone: Sprint 1
- id: ISSUE-9
  title: Create models for the application
  body: 'Create public C# classes with properties that cover the following concepts.
    All Id values must be integers that are unique per object.


    **User**

    - Id

    - Name

    - Code (equivalent to FSUID)


    **Student**

    Student should be derived from User and add the following properties:

    - Classification


    **Instructor**

    Instructor should be derived from User and add the following properties:

    - YearsOfExperience


    **Course**

    - Id

    - Code

    - Name

    - Description

    - Roster (list of students)

    - Modules (list of modules)

    - Assignments (list of assignments)


    **Module**

    - Id

    - Content (list of strings)


    **Assignment**

    - Id

    - Name

    - Description

    - Available Points

    - DueDate

    - Submissions (list of submissions)


    **Submission**

    - Id

    - StudentId

    - AssignmentId

    - Content (string)

    - SubmissionDate

    '
  labels:
  - course-backlog
  - sprint:01
  - type:feature
  milestone: Sprint 1
